<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ícones oficiais para o botão do Google -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- ANIMAÇÃO INICIAL -->
    <div class="intro" id="animacao">FILIMESFLIX</div>

    <!-- TELA DE LOGIN ESTILIZADA -->
    <div id="login-area">
        <h1 class="logo-texto">FILIMESFLIX</h1>
        <h2>Faça login ou crie uma conta</h2>
        
        <!-- Botão no formato oficial do Google -->
        <button class="btn-google" onclick="alert('Login com Google acionado!')">
            <i class="fab fa-google"></i> Fazer login com o Google
        </button>
        
        <div class="divisor">
            <span>ou</span>
        </div>
        
        <input type="email" placeholder="E-mail">
        <input type="password" placeholder="Senha">
        
        <button class="btn-entrar" onclick="irParaHome()">Entrar</button>
    </div>

    <!-- TELA PRINCIPAL (CONTEÚDO) -->
    <div id="conteudo" style="display: none;">
        <header>
            <span class="header-logo">FILIMESFLIX</span>
        </header>

        <!-- SEÇÃO DE FILMES -->
        <section class="secao">
            <h2>Filmes Populares</h2>
            <div class="grid-filmes">
                <div class="card-filme">
                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400" alt="Filme 1">
                    <h3>Interestelar</h3>
                </div>
                <div class="card-filme">
                    <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400" alt="Filme 2">
                    <h3>Batman</h3>
                </div>
                <div class="card-filme">
                    <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=400" alt="Filme 3">
                    <h3>Vingadores</h3>
                </div>
                <div class="card-filme">
                    <img src="https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?w=400" alt="Filme 4">
                    <h3>Invocação do Mal</h3>
                </div>
            </div>
        </section>

        <!-- SEÇÃO PRIVADA DE CANAIS -->
        <section class="secao-privada">
            <h2>🔒 Canais ao Vivo (Privado)</h2>
            <p class="aviso-privado">Disponível apenas para assinantes Premium</p>
            
            <div class="grid-canais bloqueado">
                <div class="card-canal" id="c1">
                    <div class="icone-play">🔒</div>
                    <h3>Globo AO VIVO</h3>
                </div>
                <div class="card-canal" id="c2">
                    <div class="icone-play">🔒</div>
                    <h3>TNT Sports</h3>
                </div>
            </div>
            
            <button class="btn-assinar" id="btn-premium" onclick="liberar()">Assinar para desbloquear canais</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
