<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* TUDO O QUE ESTAVA NO SEU CSS ESTÁ AQUI DENTRO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; }
        #login-area, #perfil-area, #conteudo, #conteudo-infantil { display: none; }
        
        /* Estilo básico para o site funcionar */
        .logo { color: #e50914; font-size: 2rem; font-weight: bold; text-align: center; padding: 20px; }
        button { padding: 15px; width: 100%; border: none; cursor: pointer; background: #e50914; color: #fff; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 5px 0; background: #333; color: white; border: none; }
        
        /* Estilos que você já tinha */
        #login-area { display: block; padding: 20px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-area">
        <h1 class="logo">FILIMESFLIX</h1>
        <input type="text" placeholder="E-mail">
        <input type="password" placeholder="Senha">
        <button onclick="irParaPerfis()">Entrar</button>
    </div>

    <!-- PERFIS -->
    <div id="perfil-area">
        <h1>Quem está assistindo?</h1>
        <button onclick="escolherPerfil('Marcelo')">Perfil Marcelo</button>
        <button onclick="entrarKids()">Perfil Infantil</button>
    </div>

    <!-- HOME ADULTO -->
    <div id="conteudo">
        <h1>Bem-vindo! <span id="nome-perfil-ativo"></span></h1>
        <button onclick="location.reload()">Sair</button>
    </div>

    <!-- HOME INFANTIL -->
    <div id="conteudo-infantil">
        <h1>Área Kids</h1>
        <img src="https://m.media-amazon.com/images/M/MV/MBWNmY2Y2YtYThmNS00YjVlLWE4Y2UtMmRiNzg0MGE3MjYxXkEyXkFqcGdeQXVyNTM3MDMyMDQ@._V1_.jpg" alt="Bob Esponja" style="width:100%">
        <button onclick="location.reload()">Voltar</button>
    </div>

    <script>
        // TUDO O QUE ESTAVA NO SEU JS ESTÁ AQUI DENTRO
        function irParaPerfis() {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('perfil-area').style.display = 'block';
        }

        function escolherPerfil(nome) {
            document.getElementById('perfil-area').style.display = 'none';
            document.getElementById('conteudo').style.display = 'block';
            document.getElementById('nome-perfil-ativo').innerText = nome;
        }

        function entrarKids() {
            document.getElementById('perfil-area').style.display = 'none';
            document.getElementById('conteudo-infantil').style.display = 'block';
        }
    </script>
</body>
</html>
