<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #E50914;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            background-color: #333333;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-size: 1rem;
        }

        .input-group input::placeholder {
            color: #8c8c8c;
        }

        .input-group input:focus {
            outline: none;
            background-color: #454545;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #E50914;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #b81d24;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>FILIMESFLIX</h1>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" placeholder="E-mail" required>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Senha" required>
            </div>
            
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        // Redireciona para o catálogo ao clicar no botão "Entrar"
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            window.location.href = 'filmes.html';
        });
    </script>

</body>
</html>
