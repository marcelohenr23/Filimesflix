<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filimesflix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* Login */
        #login-area { width: 92%; max-width: 380px; margin: 40px auto; padding: 30px 20px; background: #141414; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .logo-texto { color: #e50914; font-size: 2.3rem; margin-bottom: 10px; font-weight: 900; }
        #login-area h2 { font-size: 1.1rem; color: #aaa; font-weight: 400; margin-bottom: 25px; }
        .btn-google, .btn-entrar { width: 100%; padding: 16px; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; display: block; }
        .btn-google { background: #ffffff; color: #1f1f1f; border: 1px solid #747775; margin-bottom: 12px; font-weight: 500; }
        .btn-entrar { background: #e50914; color: white; margin-top: 12px; }

        /* TELA DE PERFIS */
        #perfil-area { position: relative; min-height: 100vh; background: #141414; }
        .banner-perfil { width: 100%; height: 40vh; background-image: url('https://images.unsplash.com/photo-1533928298208-27ff66555d8d?w=800'); background-size: cover; background-position: center top; position: relative; }
        .banner-gradiente { position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, #141414 10%, rgba(20,20,20,0.4) 60%, rgba(0,0,0,0.8)); }
        
        .container-perfis { padding: 20px; text-align: center; }
        .grid-perfis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 360px; margin: 0 auto; }
        .card-perfil { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .avatar { width: 75px; height: 75px; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
        .azul { background: #1e88e5; } .amarelo { background: #fdd835; } .vermelho { background: #e53935; } .infantil { background: linear-gradient(45deg, #ff007f, #ffaa00); }
        .card-perfil span { font-size: 0.85rem; color: #aaa; margin-top: 8px; }

        /* TELA INFANTIL - PREMIUM NETFLIX PURPLE STYLE */
        #conteudo-infantil { width: 100%; background: linear-gradient(to bottom, #190b2b 0%, #0d0617 40%, #05020a 100%); min-height: 100vh; display: none; padding-bottom: 90px; }
        .header-infantil { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(25, 11, 43, 0.85); backdrop-filter: blur(10px); }
        .marca-kids { display: flex; align-items: center; gap: 8px; }
        .logo-n { color: #e50914; font-weight: 900; font-size: 1.8rem; }
        .badge-infantil-topo { background: #391963; color: #00ffcc; font-weight: bold; font-size: 0.9rem; padding: 4px 12px; border-radius: 20px; border: 1px solid #00ffcc; text-transform: uppercase; }
        .icones-topo-infantil { display: flex; gap: 20px; color: #fff; font-size: 1.3rem; }
        
        /* Destaque Principal */
        .container-destaque { padding: 15px; }
        .card-destaque { width: 100%; border-radius: 16px; overflow: hidden; position: relative; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .card-destaque img { width: 100%; height: 420px; object-fit: cover; display: block; }
        .gradiente-destaque { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(13, 6, 23, 1) 0%, rgba(13, 6, 23, 0.4) 50%, transparent 80%); }
        
        .info-destaque { position: absolute; bottom: 25px; left: 0; width: 100%; text-align: center; padding: 0 20px; }
        .titulo-desenho-destaque { font-size: 2.2rem; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 0 4px 12px rgba(0,0,0,0.9); margin-bottom: 4px; }
        .tags-destaque { font-size: 0.8rem; color: #b3a2cd; margin-bottom: 20px; font-weight: 500; }
        
        .botoes-destaque { display: flex; justify-content: center; gap: 12px; width: 100%; max-width: 320px; margin: 0 auto; }
        .btn-assistir-infantil { flex: 1; background: #ffffff; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .btn-lista-infantil { flex: 1; background: rgba(255, 255, 255, 0.2); color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; backdrop-filter: blur(5px); }

        /* Categorias e Carrossel */
        .categoria-infantil-container { padding-left: 15px; margin-bottom: 25px; }
        .titulo-categoria-infantil { font-size: 1.25rem; font-weight: bold; color: #fff; margin-bottom: 12px; }
        .carrossel-horizontal { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .carrossel-horizontal::-webkit-scrollbar { display: none; }

        .item-desenho { flex: 0 0 135px; scroll-snap-align: start; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); background: #222; }
        .item-desenho img { width: 100%; height: 195px; object-fit: cover; display: block; }
        
        /* Menu de Navegação Fixo */
        .menu-inferior-kids { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: #09040f; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .item-menu-inferior { display: flex; flex-direction: column; align-items: center; color: #7c6899; font-size: 0.75rem; font-weight: 500; cursor: pointer; gap: 4px; }
        .item-menu-inferior i { font-size: 1.3rem; }
        .item-menu-inferior.ativo { color: #fff; }
        .item-menu-inferior.sair { color: #ff3b30; }
    </style>
</head>
<body>

    <!-- 1. TELA DE LOGIN -->
    <div id="login-area">
        <h1 class="logo-texto">FILIMESFLIX</h1>
        <h2>Faça login para continuar</h2>
        <button class="btn-google" onclick="irParaPerfis()">Entrar no App</button>
    </div>

    <!-- 2. TELA DE SELEÇÃO DE PERFIL -->
    <div id="perfil-area" style="display: none;">
        <div class="banner-perfil"><div class="banner-gradiente"></div></div>
        <div class="container-perfis">
            <p style="margin-bottom: 20px; font-size: 1.1rem;">Quem está assistindo?</p>
            <div class="grid-perfis" id="lista-de-perfis">
                <div class="card-perfil" onclick="entrarNoCatalogo('Marcelo', false)"><div class="avatar azul"></div><span>Marcelo</span></div>
                <div class="card-perfil" onclick="entrarNoCatalogo('Infantil', true)"><div class="avatar infantil"></div><span>Infantil</span></div>
            </div>
        </div>
    </div>

    <!-- 3. SEÇÃO INFANTIL TOTALMENTE EDITADA COM AS CAPAS DE VERDADE -->
    <div id="conteudo-infantil">
        <header class="header-infantil">
            <div class="marca-kids">
                <span class="logo-n">F</span>
                <span class="badge-infantil-topo">Kids</span>
            </div>
            <div class="icones-topo-infantil">
                <i class="fa-solid fa-download"></i>
                <i class="fa-solid fa-bell"></i>
            </div>
        </header>
        
        <!-- DESTAQUE PRINCIPAL: Bob Esponja (Capa Original) -->
        <div class="container-destaque">
            <div class="card-destaque">
                <img src="https://image.tmdb.org/t/p/w500/vXN9wKstAAsYv7vX3vYvYm7I9S1.jpg" alt="Bob Esponja">
                <div class="gradiente-destaque"></div>
                <div class="info-destaque">
                    <h1 class="titulo-desenho-destaque">Bob Esponja</h1>
                    <p class="tags-destaque">Comédia • Clássico • Família</p>
                    <div class="botoes-destaque">
                        <button class="btn-assistir-infantil"><i class="fa-solid fa-play"></i> Assistir</button>
                        <button class="btn-lista-infantil"><i class="fa-solid fa-plus"></i> Minha Lista</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- CARROSSEL DE DESENHOS DE VERDADE -->
        <div class="categoria-infantil-container">
            <h2 class="titulo-categoria-infantil">Os Favoritos da Galera</h2>
            <div class="carrossel-horizontal">
                
                <!-- Shrek -->
                <div class="item-desenho">
                    <img src="https://image.tmdb.org/t/p/w500/iB64vpL3YI1w7vww7Oxyz76S3Z7.jpg" alt="Shrek">
                </div>
                
                <!-- Masha e o Urso -->
                <div class="item-desenho">
                    <img src="https://image.tmdb.org/t/p/w500/9G1E76oWfQ2lJ3E8eZ0yYVfU0WJ.jpg" alt="Masha e o Urso">
                </div>
                
                <!-- Power Rangers -->
                <div class="item-desenho">
                    <img src="https://image.tmdb.org/t/p/w500/8u9zG2XyZf0b2fB12g2T4N5m8Wl.jpg" alt="Power Rangers">
                </div>
                
                <!-- Barbie -->
                <div class="item-desenho">
                    <img src="https://image.tmdb.org/t/p/w500/iuFNmBTD537dO9vjT6gA6vR2vIu.jpg" alt="Barbie">
                </div>

                <!-- Peppa Pig -->
                <div class="item-desenho">
                    <img src="https://image.tmdb.org/t/p/w500/2m742GzSskP9k0rV4H8nNre6mbe.jpg" alt="Peppa Pig">
                </div>

                <!-- Tom e Jerry -->
                <div class="item-desenho">
                    <img src="https://image.tmdb.org/t/p/w500/84Z909g83S9F9fK62Xw8f1O2Z0M.jpg" alt="Tom e Jerry">
                </div>

            </div>
        </div>

        <!-- Menu Inferior -->
        <div class="menu-inferior-kids">
            <div class="item-menu-inferior ativo"><i class="fa-solid fa-house"></i><span>Início</span></div>
            <div class="item-menu-inferior"><i class="fa-solid fa-magnifying-glass"></i><span>Buscar</span></div>
            <div class="item-menu-inferior sair" onclick="voltarParaPerfis()"><i class="fa-solid fa-user-gear"></i><span>Trocar Perfil</span></div>
        </div>
    </div>

    <script>
        function irParaPerfis() {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('perfil-area').style.display = 'block';
        }

        function entrarNoCatalogo(nome, ehInfantil) {
            document.getElementById('perfil-area').style.display = 'none';
            if (ehInfantil) {
                document.getElementById('conteudo-infantil').style.display = 'block';
            }
            window.scrollTo(0, 0);
        }

        function voltarParaPerfis() {
            document.getElementById('conteudo-infantil').style.display = 'none';
            document.getElementById('perfil-area').style.display = 'block';
        }
    </script>
</body>
                                                </html>
