<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Filmesflix - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .logo { color: #E50914; font-size: 3rem; font-weight: bold; margin-bottom: 30px; }
        .login-card { background: rgba(0,0,0,0.75); padding: 60px; border-radius: 4px; width: 400px; }
        h2 { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #333; border: none; border-radius: 4px; color: #fff; }
        button { width: 100%; padding: 15px; background: #E50914; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="logo">Filmesflix</div>
    <div class="login-card">
        <h2>Entrar</h2>
        <input type="text" id="email" placeholder="Email ou telefone">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <script>
        if (localStorage.getItem('usuarioLogado') === 'true') {
            window.location.href = 'perfis.html';
        }
        function fazerLogin() {
            localStorage.setItem('usuarioLogado', 'true');
            window.location.href = 'perfis.html';
        }
    </script>
</body>
</html>
