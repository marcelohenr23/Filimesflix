<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Adicionar Perfil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #000000; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; width: 100%; max-width: 600px; margin: 0 auto; }
        .header-left { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #ffffff; }
        .btn-salvar-topo { background: none; border: none; color: #E50914; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .main-content { flex: 1; width: 100%; max-width: 600px; margin: 0 auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .avatar-container { position: relative; margin-bottom: 35px; cursor: pointer; }
        .avatar-preview { width: 110px; height: 110px; border-radius: 12px; background-size: cover; background-position: center; border: 2px solid #333; }
        .input-box { width: 100%; }
        input[type="text"] { width: 100%; background: #262626; border: none; padding: 16px; color: white; font-size: 1.1rem; border-radius: 6px; }
        
        /* Modal */
        .modal-icones { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 1000; display: none; padding: 20px; }
        .grid-icones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        .icone-opcao { width: 100%; aspect-ratio: 1/1; border-radius: 12px; cursor: pointer; background-size: cover; }
    </style>
</head>
<body>

    <div id="telaPrincipal">
        <div class="header-nav">
            <a href="perfis.html" class="header-left"><h1>Adicionar perfil</h1></a>
            <button class="btn-salvar-topo" onclick="salvarPerfil()">Salvar</button>
        </div>
        <div class="main-content">
            <div class="avatar-container" onclick="document.getElementById('modalIcones').style.display='block'">
                <div class="avatar-preview" id="preview" style="background-image: url('https://i.postimg.cc/sMnJGbJx/1784404694570.png');"></div>
            </div>
            <div class="input-box">
                <input type="text" id="nomePerfil" placeholder="Nome do perfil" maxlength="15">
            </div>
        </div>
    </div>

    <div id="modalIcones" class="modal-icones">
        <button onclick="document.getElementById('modalIcones').style.display='none'">Fechar</button>
        <div class="grid-icones">
            <div class="icone-opcao" style="background-image:url('https://i.postimg.cc/sMnJGbJx/1784404694570.png')" onclick="selecionar('https://i.postimg.cc/sMnJGbJx/1784404694570.png')"></div>
            <div class="icone-opcao" style="background-image:url('https://i.postimg.cc/rDh9R79D/1784404699916.png')" onclick="selecionar('https://i.postimg.cc/rDh9R79D/1784404699916.png')"></div>
        </div>
    </div>

    <script>
        function selecionar(url) {
            document.getElementById('preview').style.backgroundImage = "url('" + url + "')";
            document.getElementById('modalIcones').style.display = 'none';
        }

        function salvarPerfil() {
            const nome = document.getElementById('nomePerfil').value.trim();
            if (nome === "") { alert("Digite um nome!"); return; }
            
            // AQUI É A MÁGICA: Salva o nome e a imagem escolhida
            localStorage.setItem('nomeDoPerfil', nome);
            localStorage.setItem('imgDoPerfil', document.getElementById('preview').style.backgroundImage);
            
            window.location.href = 'perfis.html';
        }
    </script>
</body>
</html>
