<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Perfil</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-content { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .avatar-preview { width: 110px; height: 110px; border-radius: 12px; background-image: url('https://i.postimg.cc/sMnJGbJx/1784404694570.png'); background-size: cover; margin-bottom: 20px; }
        input { width: 100%; background: #262626; border: none; padding: 15px; color: white; border-radius: 6px; margin-bottom: 20px; }
        button { background-color: #E50914; color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Adicionar perfil</h1>
        <div class="avatar-preview"></div>
        <input type="text" id="nomePerfil" placeholder="Nome do perfil" maxlength="15">
        <button onclick="salvarPerfil()">Salvar</button>
    </div>

    <script>
        if (localStorage.getItem('usuarioLogado') !== 'true') {
            window.location.href = 'index.html';
        }

        function salvarPerfil() {
            const nome = document.getElementById('nomePerfil').value.trim();
            if (nome === "") {
                alert("Por favor, digite um nome.");
                return;
            }
            // Salva o nome na memória
            localStorage.setItem('nomeDoPerfil', nome);
            window.location.href = 'perfis.html';
        }
    </script>
</body>
</html>
