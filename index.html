<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Animação inicial */
        .intro { color: #e50914; font-size: 3rem; font-weight: 900; animation: netflixIntro 3s ease-in-out forwards; }
        @keyframes netflixIntro {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Área de Login */
        #login-area { display: none; text-align: center; width: 85%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 4px; border: none; background: #333; color: white; }
        .btn-google { background: #4285F4; width: 100%; padding: 15px; border: none; border-radius: 4px; color: white; font-weight: bold; margin-bottom: 10px; }
        .btn-entrar { background: #e50914; width: 100%; padding: 15px; border: none; border-radius: 4px; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="intro">FILIMESFLIX</div>

    <div id="login-area">
        <h1>Faça login ou crie uma conta</h1>
        
        <button class="btn-google" onclick="alert('Funcionalidade de Google Login em breve!')">
            Login com Google
        </button>
        
        <p>ou</p>
        
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Senha">
        
        <button class="btn-entrar">Entrar</button>
    </div>

    <script>
        // Lógica para esconder a animação e mostrar o login
        setTimeout(() => {
            document.querySelector('.intro').style.display = 'none';
            document.getElementById('login-area').style.display = 'block';
        }, 3000);
    </script>
</body>
</html>
