<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ANIMAÇÃO INICIAL -->
    <div class="intro" id="animacao">FILIMESFLIX</div>

    <!-- TELA DE LOGIN -->
    <div id="login-area">
        <h1>Faça login ou crie uma conta</h1>
        <button class="btn-google">Login com Google</button>
        <p>ou</p>
        <input type="email" placeholder="Email"><br>
        <input type="password" placeholder="Senha"><br>
        <button class="btn-entrar" onclick="irParaHome()">Entrar</button>
    </div>

    <!-- TELA PRINCIPAL (CONTEÚDO) -->
    <div id="conteudo" style="display: none;">
        <h1>Filmes</h1>
        <div class="grid">
            <div class="item">Filme 1</div>
            <div class="item">Filme 2</div>
        </div>

        <h1 style="margin-top: 30px;">Canais ao Vivo</h1>
        <div class="grid">
            <div class="item bloqueado" id="c1">Canal 1</div>
            <div class="item bloqueado" id="c2">Canal 2</div>
        </div>
        <button class="btn-assinar" onclick="liberar()">Assinar para desbloquear</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
