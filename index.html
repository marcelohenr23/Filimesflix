<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix - Login</title>
    <style>
        /* Seu estilo da tela de login */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 90%; max-width: 400px; padding: 40px; background: rgba(0,0,0,0.75); border-radius: 8px; text-align: center; }
        h1 { color: #e50914; font-size: 2.5rem; margin-bottom: 25px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #333; color: #fff; border: none; border-radius: 4px; }
        button { width: 100%; padding: 15px; background: #e50914; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>FILIMESFLIX</h1>
        <input type="email" placeholder="Email ou número de telefone">
        <input type="password" placeholder="Senha">
        <!-- Esse comando abaixo faz mudar de página para o seu arquivo perfis.html -->
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <script>
        function fazerLogin() {
            // Redireciona direto para a sua tela de perfis organizada
            window.location.href = "perfis.html";
        }
    </script>
</body>
</html>
