<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Filmesflix - Login</title>
    <style>
        /* Design estilo Netflix completo */
        body { margin: 0; background: url('https://assets.nflxext.com/ffe/siteui/vlv3/login_background.jpg') center/cover; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: rgba(0,0,0,0.75); padding: 60px; border-radius: 4px; width: 450px; color: #fff; }
        .logo { color: #E50914; font-size: 3rem; font-weight: 800; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #333; border: none; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 15px; background: #E50914; border: none; color: #fff; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .options { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.9rem; color: #b3b3b3; }
        .signup { margin-top: 30px; color: #737373; }
        .signup a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">Filmesflix</div>
        <h2>Entrar</h2>
        <input type="email" placeholder="Email ou número de telefone">
        <input type="password" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
        <div class="options">
            <label><input type="checkbox"> Lembrar de mim</label>
            <a href="#">Precisa de ajuda?</a>
        </div>
        <div class="signup">Novo por aqui? <a href="#">Assine agora.</a></div>
    </div>

    <script>
        function fazerLogin() {
            localStorage.setItem('usuarioLogado', 'true');
            window.location.href = 'perfis.html';
        }
    </script>
</body>
</html>
