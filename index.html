<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlix Premium - Criar Conta</title>
    <style>
        /* Mantendo o padrão Dark Mode do catálogo */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f13; color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Menu Superior igual ao catálogo */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #000; }
        .logo { color: #e50914; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .btn-voltar { background: #222; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 0.85rem; }

        /* Container Centralizado do Formulário */
        .container-cadastro { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card-cadastro { background: #1c1c24; width: 100%; max-width: 400px; padding: 30px; border-radius: 16px; box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5); border: 1px solid #2d2d3d; }
        
        h2 { font-size: 1.6rem; margin-bottom: 25px; color: #fff; border-left: 4px solid #e50914; padding-left: 10px; }

        /* Estilização dos Inputs */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: #b3b3b3; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; background-color: #0f0f13; border: 1px solid #3a3a4a; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.3s; }
        
        /* Foco no Input (Efeito de clique) */
        .form-group input:focus { border-color: #e50914; }

        /* Botão de Enviar Criar Conta */
        .btn-enviar { width: 100%; background: #e50914; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s, transform 0.1s; }
        .btn-enviar:hover { background: #b80710; }
        .btn-enviar:active { transform: scale(0.98); }

        /* Link de "Já tenho conta" */
        .link-login { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #b3b3b3; }
        .link-login a { color: #e50914; text-decoration: none; font-weight: bold; }
        .link-login a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Menu -->
    <header>
        <a href="index.html" class="logo">CINEFLIX</a>
        <!-- Link apontando de volta para o seu catálogo atual -->
        <a href="index.html" class="btn-voltar">Voltar ao Catálogo</a>
    </header>

    <!-- Área do Formulário -->
    <main class="container-cadastro">
        <div class="card-cadastro">
            <h2>Criar Conta</h2>
            
            <form action="#">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="form-group">
                    <label for="confirma-senha">Confirmar Senha</label>
                    <input type="password" id="confirma-senha" placeholder="Repita a senha" required>
                </div>

                <button type="submit" class="btn-enviar">Cadastrar</button>
            </form>

            <div class="link-login">
                Já tem uma conta? <a href="#">Entrar aqui</a>
            </div>
        </div>
    </main>

</body>
</html>
