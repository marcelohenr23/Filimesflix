<form onsubmit="return false;">
    <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
    </div>

    <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
    </div>

    <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha" required>
    </div>

    <div class="form-group">
        <label for="confirma-senha">Confirmar Senha</label>
        <input type="password" id="confirma-senha" placeholder="Repita a senha" required>
    </div>

    <!-- Chamando a função ao clicar -->
    <button type="button" class="btn-enviar" onclick="finalizarCadastro()">Cadastrar</button>
</form>

<script>
    function finalizarCadastro() {
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const confirmaSenha = document.getElementById('confirma-senha').value;

        // Validação básica para celular não passar em branco
        if (!nome || !email || !senha || !confirmaSenha) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        if (senha !== confirmaSenha) {
            alert('As senhas não coincidem! Verifique e tente novamente.');
            return;
        }

        alert('Conta criada com sucesso! Redirecionando para a tela de login...');
        
        // FORÇA o redirecionamento exato para o arquivo de login com o .html no final
        window.location.href = 'login.html';
    }
</script>
