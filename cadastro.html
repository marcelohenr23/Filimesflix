<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Filmesflix - Cadastro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 92%; max-width: 400px; }
        .logo { color: #E50914; font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #333; border: none; color: #fff; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #E50914; border: none; color: #fff; font-weight: bold; margin-top: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">Filmesflix</div>
        <h2>Criar sua conta</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <script>
        function cadastrar() {
            // Salva que o usuário já criou conta
            localStorage.setItem('contaCriada', 'true');
            alert("Conta criada com sucesso!");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
