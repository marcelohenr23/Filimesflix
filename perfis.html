<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix - Quem está assistindo?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .perfis-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .perfil-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #808080;
            width: 120px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .perfil-box:hover {
            color: #ffffff;
            transform: scale(1.05);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 3px solid transparent;
            margin-bottom: 12px;
            transition: border-color 0.2s;
            background-color: #222;
        }

        .perfil-box:hover .avatar {
            border-color: #ffffff;
        }

        .nome {
            font-size: 0.95rem;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }

        .btn-adicionar {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #141414;
            color: #808080;
            font-size: 3.5rem;
            font-weight: 300;
            transition: background-color 0.2s, color 0.2s;
        }

        .perfil-box:hover .btn-adicionar {
            background-color: #cccccc;
            color: #000000;
            border-color: transparent;
        }

        .btn-gerenciar {
            background: none;
            border: 1px solid #808080;
            color: #808080;
            padding: 10px 24px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            margin-top: 20px;
        }

        .btn-gerenciar:hover {
            border-color: #ffffff;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quem está assistindo?</h1>

        <div class="perfis-grid" id="containerPerfis">
            
            <!-- O Perfil Principal sempre fixo -->
            <div class="perfil-box" onclick="entrarNoSite('Principal')">
                <div class="avatar" style="background-image: url('https://i.postimg.cc/7CR89sqS/lv-0-20260718171739.jpg');"></div>
                <div class="nome">Principal</div>
            </div>

            <!-- Os perfis novos que você criar vão aparecer AUTOMATICAMENTE bem aqui no meio -->

            <!-- Botão fixo de Adicionar Perfil (+) -->
            <a href="adicionar.html" class="perfil-box" id="blocoBotaoAdicionar">
                <div class="avatar btn-adicionar">+</div>
                <div class="nome">Adicionar perfil</div>
            </a>
        </div>

        <button class="btn-gerenciar" onclick="limparPerfis()">Limpar criados</button>
    </div>

    <script>
        // Função executada assim que a tela abre
        window.onload = function() {
            const container = document.getElementById('containerPerfis');
            const botaoAdicionar = document.getElementById('blocoBotaoAdicionar');
            
            // Puxa os perfis criados salvos na memória do navegador
            let perfisSalvos = JSON.parse(localStorage.getItem('perfisFilimesflix')) || [];
            
            // Desenha cada perfil novo na tela
            perfisSalvos.forEach(perfil => {
                const novoPerfilHtml = `
                    <div class="perfil-box" onclick="entrarNoSite('${perfil.nome}')">
                        <div class="avatar" style="background-image: url('${perfil.foto}');"></div>
                        <div class="nome">${perfil.nome}</div>
                    </div>
                `;
                // Insere antes do botão de "Adicionar Perfil (+)"
                botaoAdicionar.insertAdjacentHTML('beforebegin', novoPerfilHtml);
            });
        };

        function entrarNoSite(nomePerfil) {
            alert("Entrando como " + nomePerfil + "...");
        }

        // Função extra caso queira apagar os perfis criados e começar de novo
        function limparPerfis() {
            if(confirm("Deseja apagar os perfis adicionais criados?")) {
                localStorage.removeItem('perfisFilimesflix');
                window.location.reload();
            }
        }
    </script>

</body>
</html>
