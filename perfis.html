<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quem está assistindo?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h1 { font-size: 1.5rem; margin-bottom: 30px; font-weight: normal; }
        .perfis-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; padding: 0 20px; }
        .perfil-box { text-align: center; cursor: pointer; width: 100px; }
        .avatar { width: 100px; height: 100px; border-radius: 4px; background-size: cover; background-position: center; margin-bottom: 10px; }
        .perfil-nome { color: #808080; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>Quem está assistindo?</h1>

    <div class="perfis-container">
        <!-- Perfil Principal -->
        <div class="perfil-box" onclick="window.location.href='filmes.html'">
            <div class="avatar" style="background-image: url('https://i.postimg.cc/sMnJGbJx/1784404694570.png');"></div>
            <div class="perfil-nome" id="nomeExibido">Carregando...</div>
        </div>

        <!-- Perfil Kids (Novo) -->
        <div class="perfil-box" onclick="window.location.href='filmes.html'">
            <div class="avatar" style="background-color: #fff; background-image: url('https://img.icons8.com/color/100/000000/child-skin-type-1.png');"></div>
            <div class="perfil-nome">Kids</div>
        </div>
    </div>

    <script>
        // Puxa o nome que você salvou lá no "adicionar.html"
        const nomeSalvo = localStorage.getItem('nomeDoPerfil');
        document.getElementById('nomeExibido').innerText = nomeSalvo ? nomeSalvo : "Usuário";
    </script>
</body>
</html>
