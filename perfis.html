<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quem está assistindo?</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial; text-align: center; padding-top: 100px; }
        .perfis-container { display: flex; justify-content: center; gap: 20px; }
        .perfil-box { cursor: pointer; }
        .avatar { width: 100px; height: 100px; border-radius: 8px; background-image: url('https://i.postimg.cc/sMnJGbJx/1784404694570.png'); background-size: cover; }
        .btn-adicionar { width: 100px; height: 100px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #333; }
    </style>
</head>
<body>

    <h1>Quem está assistindo?</h1>

    <div class="perfis-container">
        <!-- Perfil que será dinâmico -->
        <div class="perfil-box" onclick="entrar()">
            <div class="avatar"></div>
            <div class="perfil-nome" id="nomeExibido">Carregando...</div>
        </div>

        <!-- Botão Adicionar -->
        <a href="adicionar.html" class="btn-adicionar">+</a>
    </div>

    <script>
        // Trava de segurança
        if (localStorage.getItem('usuarioLogado') !== 'true') {
            window.location.href = 'index.html';
        }

        // Carrega o nome salvo
        const nomeSalvo = localStorage.getItem('nomeDoPerfil');
        if (nomeSalvo) {
            document.getElementById('nomeExibido').innerText = nomeSalvo;
        } else {
            document.getElementById('nomeExibido').innerText = 'Usuário';
        }

        function entrar() {
            alert("Entrando...");
        }
    </script>
</body>
</html>
