<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quem está assistindo?</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial; }
        .container { display: flex; gap: 30px; }
        .perfil { text-align: center; cursor: pointer; }
        .avatar { width: 150px; height: 150px; background: #333; border-radius: 5px; margin-bottom: 10px; border: 3px solid transparent; }
        .perfil:hover .avatar { border: 3px solid #fff; }
        .nome { color: #808080; font-size: 1.2rem; }
        .btn-add { display: block; margin-top: 50px; color: #808080; text-decoration: none; border: 1px solid #808080; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Quem está assistindo?</h1>
    <div class="container">
        <div class="perfil">
            <div class="avatar" style="background-image: url('https://i.postimg.cc/sMnJGbJx/1784404694570.png'); background-size: cover;"></div>
            <div class="nome" id="nomeExibido">Carregando...</div>
        </div>
    </div>
    <a href="adicionar.html" class="btn-add">Adicionar perfil</a>

    <script>
        if (localStorage.getItem('usuarioLogado') !== 'true') window.location.href = 'index.html';
        const nome = localStorage.getItem('nomeDoPerfil');
        document.getElementById('nomeExibido').innerText = nome ? nome : "Usuário";
    </script>
</body>
</html>
