<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Quem está assistindo?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .perfis-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 50px;
        }

        .perfil-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            width: 100px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.2s;
        }

        .perfil-box:active .avatar {
            transform: scale(0.95);
            border-color: #ffffff;
        }

        .perfil-nome {
            font-size: 0.9rem;
            color: #808080;
            text-align: center;
            transition: color 0.2s;
        }

        .perfil-box:active .perfil-nome {
            color: #ffffff;
        }

        /* Botão Adicionar Perfil */
        .btn-adicionar {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            border: 2px dashed #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            transition: border-color 0.2s, color 0.2s;
        }

        .perfil-box:active .btn-adicionar {
            border-color: #808080;
            color: #808080;
        }

        /* Botão de Gerenciar lá embaixo */
        .btn-gerenciar {
            background: none;
            border: 1px solid #808080;
            color: #808080;
            padding: 10px 24px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-gerenciar:active {
            border-color: #ffffff;
            color: #ffffff;
        }

        /* Imagens padrão do sistema estáveis */
        .p1 { background-image: url('https://i.postimg.cc/sMnJGbJx/1784404694570.png'); }
    </style>
</head>
<body>

    <h1>Quem está assistindo?</h1>

    <div class="perfis-container">
        <!-- Perfil Padrão -->
        <div class="perfil-box" onclick="entrarNoSite('Usuário')">
            <div class="avatar p1"></div>
            <div class="perfil-nome">Usuário</div>
        </div>

        <!-- Botão para Criar Novo Perfil -->
        <a href="adicionar.html" class="perfil-box">
            <div class="btn-adicionar">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
            <div class="perfil-nome">Adicionar</div>
        </a>
    </div>

    <button class="btn-gerenciar">Gerenciar perfis</button>

    <script>
        // Trava de segurança: Se tentar pular direto pra cá sem logar, joga pro login
        if (sessionStorage.getItem('logado') !== 'true') {
            window.location.href = 'index.html';
        }

        function entrarNoSite(nomePerfil) {
            alert("Entrando como " + nomePerfil + "...");
        }
    </script>

</body>
</html>
