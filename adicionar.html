<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix - Adicionar Perfil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #141414; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: normal; }
        p { color: #666; margin-bottom: 30px; font-size: 1.1rem; }
        
        .perfil-box { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin-bottom: 30px; }
        
        /* Preview do Avatar */
        .avatar-preview { width: 95px; height: 95px; border-radius: 8px; background-color: #2b7fff; position: relative; transition: background 0.3s; }
        .avatar-preview::before { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 30px; left: 22px; box-shadow: 32px 0 #fff; }
        .avatar-preview::after { content: ''; position: absolute; width: 40px; height: 20px; border: 5px solid #fff; border-radius: 0 0 50px 50px; border-top: none; top: 52px; left: 28px; }

        input[type="text"] { flex: 1; background: #666; border: none; padding: 12px; color: white; font-size: 1.1rem; border-radius: 2px; }
        input[type="text"]::placeholder { color: #cccccc; }
        input[type="text"]:focus { outline: none; background: #777; }

        .opcoes-cores { margin-top: 15px; display: flex; gap: 10px; }
        .cor-btn { width: 35px; height: 35px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .cor-btn.active { border-color: white; }

        .botoes { display: flex; gap: 20px; }
        .btn { padding: 12px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; text-decoration: none; text-align: center; }
        .btn-salvar { background-color: #ffffff; color: #000000; }
        .btn-salvar:hover { background-color: #cccccc; }
        .btn-cancelar { background-color: transparent; color: #8c8c8c; border: 1px solid #8c8c8c; }
        .btn-cancelar:hover { border-color: white; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Adicionar perfil</h1>
        <p>Adicione um perfil para outra pessoa assistir Filimesflix.</p>

        <div class="perfil-box">
            <div class="avatar-preview" id="preview"></div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="nomePerfil" placeholder="Nome" maxlength="15">
                
                <div class="opcoes-cores">
                    <div class="cor-btn active" style="background-color: #2b7fff;" onclick="mudarCor('#2b7fff', this)"></div>
                    <div class="cor-btn" style="background-color: #ffc83b;" onclick="mudarCor('#ffc83b', this)"></div>
                    <div class="cor-btn" style="background-color: #e50914;" onclick="mudarCor('#e50914', this)"></div>
                    <div class="cor-btn" style="background: linear-gradient(45deg, #ff007f, #ff5e00);" onclick="mudarCor('linear-gradient(45deg, #ff007f, #ff5e00)', this)"></div>
                </div>
            </div>
        </div>

        <div class="botoes">
            <button class="btn btn-salvar" onclick="salvarPerfil()">Continuar</button>
            <a href="perfis.html" class="btn btn-cancelar">Cancelar</a>
        </div>
    </div>

    <script>
        let corSelecionada = '#2b7fff';

        function mudarCor(cor, elemento) {
            corSelecionada = cor;
            document.getElementById('preview').style.background = cor;
            
            // Atualiza a borda do botão selecionado
            document.querySelectorAll('.cor-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }

        function salvarPerfil() {
            const nome = document.getElementById('nomePerfil').value.trim();
            if (nome === "") {
                alert("Por favor, digite um nome para o perfil.");
                return;
            }
            
            // Simulação de salvamento (Apenas retorna para a tela de perfis)
            alert("Perfil '" + nome + "' criado com sucesso!");
            window.location.href = 'perfis.html';
        }
    </script>

</body>
</html>
