<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filimesflix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* Layouts simplificados para evitar travamento */
        #login-area { width: 90%; margin: 50px auto; text-align: center; }
        .logo-texto { color: #e50914; font-size: 2.5rem; margin-bottom: 20px; font-weight: 900; }
        button { width: 100%; padding: 15px; background: #e50914; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        #perfil-area, #conteudo, #conteudo-infantil { display: none; padding: 20px; }
        
        /* Ajuste das suas novas imagens */
        .card-destaque img { width: 100%; border-radius: 12px; }
        .carrossel-horizontal { display: flex; gap: 10px; overflow-x: auto; padding: 10px; }
        .item-desenho { flex: 0 0 140px; }
        .item-desenho img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-area">
        <h1 class="logo-texto">FILIMESFLIX</h1>
        <button onclick="irParaPerfis()">Entrar com Google</button>
    </div>

    <!-- PERFIS -->
    <div id="perfil-area">
        <h1>Quem está assistindo?</h1>
        <button onclick="entrarNoCatalogo('Marcelo', false)">Marcelo</button>
        <button onclick="entrarNoCatalogo('Infantil', true)">Infantil</button>
    </div>

    <!-- HOME ADULTO -->
    <div id="conteudo">
        <h1>Bem-vindo!</h1>
        <button onclick="irParaPerfis()">Sair</button>
    </div>

    <!-- HOME INFANTIL (Com suas artes novas) -->
    <div id="conteudo-infantil">
        <h1>Área Kids</h1>
        <!-- DESTAQUE NOVO -->
        <div class="card-destaque">
            <img src="https://i.postimg.cc/7CR89sqS/lv-0-20260718171739.jpg" alt="Bob Esponja">
        </div>
        
        <!-- LISTA NOVA -->
        <div class="carrossel-horizontal">
            <div class="item-desenho"><img src="https://i.postimg.cc/hJYWsyKT/lv-0-20260718171912.jpg" alt="Shrek"></div>
            <div class="item-desenho"><img src="https://i.postimg.cc/1gdhBCy6/lv-0-20260718172009.jpg" alt="Masha"></div>
            <div class="item-desenho"><img src="https://i.postimg.cc/VShQgGzj/lv-0-20260718172326.jpg" alt="Power"></div>
            <div class="item-desenho"><img src="https://i.postimg.cc/p9SbCGPm/lv-0-20260718172436.jpg" alt="Barbie"></div>
        </div>
        <button onclick="irParaPerfis()">Voltar</button>
    </div>

    <script>
        function irParaPerfis() {
            document.getElementById('login-area').style.display = 'block';
            document.getElementById('perfil-area').style.display = 'none';
            document.getElementById('conteudo').style.display = 'none';
            document.getElementById('conteudo-infantil').style.display = 'none';
        }
        function entrarNoCatalogo(nome, infantil) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('perfil-area').style.display = 'none';
            if(infantil) {
                document.getElementById('conteudo-infantil').style.display = 'block';
            } else {
                document.getElementById('conteudo').style.display = 'block';
            }
        }
    </script>
</body>
</html>
