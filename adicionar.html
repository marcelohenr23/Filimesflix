<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix - Adicionar Perfil</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Arial', sans-serif; 
        }
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }

        /* Barra superior idêntica a de aplicativos */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #ffffff;
        }

        .header-left h1 {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .btn-salvar-topo {
            background: none;
            border: none;
            color: #E50914;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Conteúdo principal centralizado */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Área do Avatar com o ícone de lápis sobreposto */
        .avatar-container {
            position: relative;
            margin-bottom: 35px;
        }
        
        .avatar-preview { 
            width: 110px; 
            height: 110px; 
            border-radius: 8px; 
            background-color: #2b7fff; 
            position: relative; 
            transition: background 0.3s; 
        }
        
        .avatar-preview::before { 
            content: ''; 
            position: absolute; 
            width: 18px; 
            height: 18px; 
            background: #fff; 
            border-radius: 50%; 
            top: 35px; 
            left: 26px; 
            box-shadow: 36px 0 #fff; 
        }
        
        .avatar-preview::after { 
            content: ''; 
            position: absolute; 
            width: 44px; 
            height: 22px; 
            border: 5px solid #fff; 
            border-radius: 0 0 50px 50px; 
            border-top: none; 
            top: 60px; 
            left: 33px; 
        }

        .badge-lapis {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background-color: #ffffff;
            color: #000000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        /* Campo de Texto ocupando a largura total */
        .input-box {
            width: 100%;
            margin-bottom: 30px;
        }

        input[type="text"] { 
            width: 100%;
            background: #333333; 
            border: none; 
            padding: 16px; 
            color: white; 
            font-size: 1.1rem; 
            border-radius: 4px; 
        }
        
        input[type="text"]::placeholder { 
            color: #8c8c8c; 
        }
        
        input[type="text"]:focus { 
            outline: none; 
            background: #444444; 
        }

        /* Seleção de Cores horizontal estilizada */
        .secao-cores {
            width: 100%;
            text-align: left;
            margin-bottom: 20px;
        }

        .secao-cores label {
            color: #8c8c8c;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 12px;
        }

        .opcoes-cores { 
            display: flex; 
            gap: 14px; 
        }
        
        .cor-btn { 
            width: 42px; 
            height: 42px; 
            border-radius: 6px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: transform 0.1s;
        }
        
        .cor-btn.active { 
            border-color: #ffffff; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Topo funcional estilo app -->
    <div class="header-nav">
        <a href="perfis.html" class="header-left">
            <!-- Seta de voltar -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <h1>Adicionar perfil</h1>
        </a>
        <button class="btn-salvar-topo" onclick="salvarPerfil()">Salvar</button>
    </div>

    <!-- Centro do formulário -->
    <div class="main-content">
        
        <div class="avatar-container">
            <div class="avatar-preview" id="preview"></div>
            <div class="badge-lapis">
                <!-- Ícone do Lápis -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="nomePerfil" placeholder="Nome do perfil" maxlength="15" autocomplete="off">
        </div>

        <div class="secao-cores">
            <label>Escolha a cor do tema:</label>
            <div class="opcoes-cores">
                <div class="cor-btn active" style="background-color: #2b7fff;" onclick="mudarCor('#2b7fff', this)"></div>
                <div class="cor-btn" style="background-color: #ffc83b;" onclick="mudarCor('#ffc83b', this)"></div>
                <div class="cor-btn" style="background-color: #e50914;" onclick="mudarCor('#e50914', this)"></div>
                <div class="cor-btn" style="background: linear-gradient(45deg, #ff007f, #ff5e00);" onclick="mudarCor('linear-gradient(45deg, #ff007f, #ff5e00)', this)"></div>
            </div>
        </div>

    </div>

    <script>
        let corSelecionada = '#2b7fff';

        function mudarCor(cor, elemento) {
            corSelecionada = cor;
            document.getElementById('preview').style.background = cor;
            
            document.querySelectorAll('.cor-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }

        function salvarPerfil() {
            const nome = document.getElementById('nomePerfil').value.trim();
            if (nome === "") {
                alert("Por favor, digite um nome para o perfil.");
                return;
            }
            
            alert("Perfil '" + nome + "' criado com sucesso!");
            window.location.href = 'perfis.html';
        }
    </script>

</body>
</html>
