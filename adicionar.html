<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filimesflix - Adicionar Perfil</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Arial', sans-serif; 
        }
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Barra superior */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #ffffff;
        }

        .header-left h1 {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .btn-salvar-topo {
            background: none;
            border: none;
            color: #E50914;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Conteúdo principal */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Área do Avatar */
        .avatar-container {
            position: relative;
            margin-bottom: 35px;
            cursor: pointer;
        }
        
        .avatar-preview { 
            width: 110px; 
            height: 110px; 
            border-radius: 12px; 
            position: relative; 
            overflow: hidden;
            background-image: url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/image_14.png');
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
        }

        .badge-lapis {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background-color: #ffffff;
            color: #000000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Campo de Texto */
        .input-box {
            width: 100%;
            margin-bottom: 30px;
        }

        input[type="text"] { 
            width: 100%;
            background: #262626; 
            border: none; 
            padding: 16px; 
            color: white; 
            font-size: 1.1rem; 
            border-radius: 6px; 
        }
        input[type="text"]::placeholder { color: #8c8c8c; }
        input[type="text"]:focus { outline: none; background: #333333; }

        /* ================= TELA DE ESCOLHER ÍCONE (MODAL) ================= */
        .modal-icones {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 1000;
            display: none; 
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .modal-content {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .categoria-titulo {
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .grid-icones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        /* Base dos quadradinhos dos Avatares usando as fotos individuais */
        .icone-opcao {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            background-color: #141414; 
            transition: transform 0.1s ease;
        }
        .icone-opcao:active {
            transform: scale(0.95);
        }

        /* Conectando os links diretos das suas imagens enviadas */
        .av-1 { background-image: url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/image_14.png'); }
        .av-2 { background-image: url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/image_15.png'); }
        .av-3 { background-image: url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/image_16.png'); }
        .av-4 { background-image: url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/image_17.png'); }
        .av-5 { background-image: url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/image_18.png'); }

    </style>
</head>
<body>

    <!-- Conteúdo Principal -->
    <div id="telaPrincipal">
        <div class="header-nav">
            <a href="perfis.html" class="header-left">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <h1>Adicionar perfil</h1>
            </a>
            <button class="btn-salvar-topo" onclick="salvarPerfil()">Salvar</button>
        </div>

        <div class="main-content">
            <div class="avatar-container" onclick="abrirModal()">
                <div class="avatar-preview" id="preview"></div>
                <div class="badge-lapis">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
            </div>

            <div class="input-box">
                <input type="text" id="nomePerfil" placeholder="Nome do perfil" maxlength="15" autocomplete="off">
            </div>
        </div>
    </div>

    <!-- ================= TELA DE ESCOLHA DE ÍCONES (MODAL) ================= -->
    <div id="modalIcones" class="modal-icones">
        <div class="modal-header">
            <div style="cursor: pointer; display: flex; align-items: center;" onclick="fecharModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 15px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <h2>Escolha um ícone</h2>
            </div>
        </div>

        <div class="modal-content">
            <!-- CATEGORIA: CINEMÁTICOS -->
            <div>
                <p class="categoria-titulo">Cinemáticos</p>
                <div class="grid-icones">
                    <div class="icone-opcao av-1" onclick="selecionarAvatar('image_14.png')"></div>
                    <div class="icone-opcao av-2" onclick="selecionarAvatar('image_15.png')"></div>
                    <div class="icone-opcao av-3" onclick="selecionarAvatar('image_16.png')"></div>
                    <div class="icone-opcao av-4" onclick="selecionarAvatar('image_17.png')"></div>
                    <div class="icone-opcao av-5" onclick="selecionarAvatar('image_18.png')"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirModal() {
            document.getElementById('telaPrincipal').style.display = 'none';
            document.getElementById('modalIcones').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalIcones').style.display = 'none';
            document.getElementById('telaPrincipal').style.display = 'block';
        }

        function selecionarAvatar(nomeImagem) {
            const preview = document.getElementById('preview');
            preview.style.backgroundImage = `url('https://raw.githubusercontent.com/marcelohenr23/Filimesflix/main/${nomeImagem}')`;
            fecharModal();
        }

        function salvarPerfil() {
            const nome = document.getElementById('nomePerfil').value.trim();
            if (nome === "") {
                alert("Por favor, digite um nome para o perfil.");
                return;
            }
            alert("Perfil '" + nome + "' criado com sucesso!");
            window.location.href = 'perfis.html';
        }
    </script>

</body>
</html>
