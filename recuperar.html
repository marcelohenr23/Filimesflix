<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recuperar Conta - Filmesflix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 92%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 20px; }
        p { color: #b3b3b3; margin-bottom: 30px; }
        button { width: 100%; padding: 18px; background: #E50914; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .voltar { margin-top: 20px; display: block; color: #fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Precisa de ajuda?</h2>
        <p>Se você esqueceu sua conta, pode resetar o acesso para criar uma nova.</p>
        <button onclick="resetarConta()">Resetar minha conta</button>
        <a href="index.html" class="voltar">Voltar para o Login</a>
    </div>

    <script>
        function resetarConta() {
            if (confirm("Isso apagará sua conta atual e permitirá um novo cadastro. Tem certeza?")) {
                localStorage.clear();
                alert("Conta resetada com sucesso!");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
