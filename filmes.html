<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        h1 { color: #E50914; padding: 20px; font-size: 1.8rem; }
        h2 { font-size: 1.2rem; margin: 25px 0 10px 15px; color: #fff; border-left: 4px solid #E50914; padding-left: 10px; }
        
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 180px; }
        .card { min-width: 110px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .poster { width: 110px; height: 160px; background-size: cover; background-position: center; border-radius: 6px; background-color: #222; }
        .label { font-size: 0.75rem; text-align: center; margin-top: 8px; color: #ccc; }

        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 9999; justify-content:center; align-items:center; }
        .box { background:linear-gradient(180deg, #1c1c1c 0%, #000 100%); padding:30px; border-radius:15px; width:90%; max-width:350px; text-align:center; border:1px solid #333; position:relative; }
        .btn-main { width:100%; padding:14px; background:#E50914; color:#fff; border:none; font-weight:bold; cursor:pointer; border-radius:8px; margin-top:15px; font-size:1rem; }
        .btn-assistir { background:#28a745; }
    </style>
</head>
<body>

    <h1>Filmesflix</h1>

    <h2>Lançamentos</h2>
    <div class="row">
        <div class="card" onclick="playMovie('Rosário', 'el_c_8bkgRo', '#')"><div class="poster" style="background-image:url('https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg')"></div><div class="label">Rosário</div></div>
        <div class="card" onclick="playMovie('O Corvo', 'V_eJp4T0m8k', '#')"><div class="poster" style="background-image:url('https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg')"></div><div class="label">O Corvo</div></div>
    </div>

    <h2>FILMES</h2>
    <div class="row">
        <div class="card" onclick="playMovie('Vingadora', '', '#')"><div class="poster" style="background-image:url('https://i.postimg.cc/1fKdJmSm/63bd29b4-91e3-4bc4-86b3-92c5f4a4846f-m.jpg')"></div><div class="label">Vingadora</div></div>
        <div class="card" onclick="playMovie('Exorcismo', '', '#')"><div class="poster" style="background-image:url('https://i.postimg.cc/xcPZtfQV/c78d8546-4f6d-4d6c-9daf-ceced978cb69-m.jpg')"></div><div class="label">Exorcismo</div></div>
    </div>

    <h2>SÉRIES</h2>
    <div class="row">
        <div class="card"><div class="poster" style="background-color:#333;"></div><div class="label">Série 01</div></div>
    </div>

    <h2>CANAIS AO VIVO</h2>
    <div class="row">
        <div class="card" onclick="openModal('modalCanais')"><div class="poster" style="background:#E50914; display:flex; justify-content:center; align-items:center; font-size:2rem;">📺</div><div class="label">TV Premium</div></div>
    </div>

    <!-- MODAL ANÚNCIO (Premium Look) -->
    <div id="modalAnuncio" class="overlay" style="display:flex;">
        <div class="box">
            <button onclick="closeModal('modalAnuncio')" style="position:absolute; right:15px; top:15px; background:none; border:none; color:#666; font-size:20px;">✕</button>
            <div style="font-size:3rem; margin-bottom:15px;">🚫</div>
            <h2 style="border:none; color:#fff;">Remover Anúncios</h2>
            <p style="color:#aaa; font-size:0.9rem;">Experiência sem interrupções por um preço simbólico.</p>
            <button class="btn-main" onclick="startPay('Remover Ads', 'R$ 2,99')">Assinar R$ 2,99</button>
        </div>
    </div>

    <!-- MODAL CANAIS (Premium Look) -->
    <div id="modalCanais" class="overlay">
        <div class="box">
            <button onclick="closeModal('modalCanais')" style="position:absolute; right:15px; top:15px; background:none; border:none; color:#666; font-size:20px;">✕</button>
            <div style="font-size:3rem; margin-bottom:15px;">📡</div>
            <h2 style="border:none; color:#fff;">TV Premium</h2>
            <p style="color:#aaa; font-size:0.9rem;">Libere acesso total aos canais ao vivo agora.</p>
            <button class="btn-main" onclick="startPay('TV Premium', 'R$ 4,99')">Liberar R$ 4,99</button>
        </div>
    </div>

    <!-- MODAL PLAYER -->
    <div id="modalPlayer" class="overlay">
        <div class="box" style="max-width:600px;">
            <button onclick="closeModal('modalPlayer')" style="position:absolute; right:15px; top:15px; color:#fff; background:none; border:none; font-size:20px;">✕</button>
            <h3 id="mTitle" style="margin-bottom:15px;">Filme</h3>
            <div id="mContent" style="height:250px; background:#000; border-radius:8px;"></div>
            <button class="btn-main btn-assistir" onclick="assistirFilme()">▶ Assistir ao Filme</button>
        </div>
    </div>

    <!-- MODAL PIX -->
    <div id="modalPix" class="overlay"><div class="box"><h3 id="pixMsg">Pagamento</h3><input type="text" value="dfe7ba22-2505-4f4f-a1f9-aec0e440da13" id="cp" readonly style="width:100%; padding:12px; margin:15px 0; background:#000; border:1px solid #444; color:#fff; text-align:center;"><button class="btn-main" onclick="alert('Copiado!')">Copiar Chave Pix</button><button onclick="closeModal('modalPix')" style="background:none; border:none; color:#666; margin-top:15px;">Fechar</button></div></div>

    <script>
        let linkAtual = "";
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function playMovie(t, id, link) {
            document.getElementById('mTitle').innerText = t;
            linkAtual = link;
            document.getElementById('mContent').innerHTML = id ? `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>` : "<p style='padding-top:100px;'>Trailer indisponível.</p>";
            openModal('modalPlayer');
        }

        function assistirFilme() { linkAtual !== '#' ? window.open(linkAtual, '_blank') : alert("O link do filme ainda será adicionado!"); }
        
        function startPay(servico, preco) {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            document.getElementById('pixMsg').innerText = servico + " - " + preco;
            openModal('modalPix');
        }
    </script>
</body>
</html>
