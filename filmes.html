<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        h1 { color: #E50914; padding: 20px; font-size: 1.8rem; }
        h2 { font-size: 1.2rem; margin: 20px 0 10px 15px; color: #fff; }
        .catalogo { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; }
        .filme { min-width: 110px; height: 160px; background-color: #333; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        .btn-sair { margin: 40px auto; display: block; padding: 10px 30px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Filmesflix</h1>
    
    <h2>Filme recente</h2>
    <div class="catalogo">
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/i9Y4O06Xl851N4z0W47gT5p9d4h.jpg');"></div> <!-- Velozes e Furiosos 1 -->
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/u3iU367rZJ0m2c07Yq36w472314.jpg');"></div> <!-- Velozes e Furiosos 2 -->
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/z6c98Z64m0a78v7Zq498gJ6e7lO.jpg');"></div> <!-- Velozes e Furiosos 3 -->
    </div>

    <h2>FILMES</h2>
    <div class="catalogo">
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/w2eO1bO3WpY8lR666N666N47474.jpg');"></div> <!-- Homem Aranha -->
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/78xJ373n2b2oXgJ3HkP5lqH9aT.jpg');"></div> <!-- Homem de Ferro -->
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/6J2P444s111N111N111N111N.jpg');"></div> <!-- Resgate -->
    </div>

    <h2>SÉRIES</h2>
    <div class="catalogo">
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/123456789123456789.jpg');"></div> <!-- The Wolf -->
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/444555666777888999.jpg');"></div> <!-- Impuros -->
        <div class="filme" style="background-image: url('https://image.tmdb.org/t/p/w500/999888777666555444.jpg');"></div> <!-- Sintonia -->
    </div>

    <button class="btn-sair" onclick="sair()">Sair do App</button>

    <script>
        function sair() {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
