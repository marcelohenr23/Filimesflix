<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        h1 { color: #E50914; padding: 20px; font-size: 1.8rem; }
        h2 { font-size: 1.1rem; margin: 20px 0 10px 15px; color: #E50914; }
        
        .row { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 180px; }
        .card { min-width: 110px; cursor: pointer; }
        .poster { width: 110px; height: 160px; background-size: cover; background-position: center; border-radius: 4px; background-color: #333; }
        .label { font-size: 0.7rem; text-align: center; margin-top: 5px; color: #ccc; }

        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 9999; justify-content:center; align-items:center; }
        .box { background:#151515; padding:25px; border-radius:10px; width:90%; max-width:400px; text-align:center; position:relative; border:1px solid #333; }
        .btn-main { width:100%; padding:12px; background:#E50914; color:#fff; border:none; font-weight:bold; cursor:pointer; border-radius:4px; margin-top:10px; }
        .btn-assistir { background:#28a745; }
    </style>
</head>
<body>

    <h1>Filmesflix</h1>

    <h2>Lançamentos</h2>
    <div class="row">
        <div class="card" onclick="playMovie('Rosário', 'el_c_8bkgRo', 'LINK_DO_FILME_AQUI')"><div class="poster" style="background-image:url('https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg')"></div><div class="label">Rosário</div></div>
        <div class="card" onclick="playMovie('O Corvo', 'V_eJp4T0m8k', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg')"></div><div class="label">O Corvo</div></div>
        <div class="card" onclick="playMovie('Na Mira', 't2pQv9l5P1c', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/rK9HQVTk/27a21bc8-3960-4ad1-9b12-40dc6e001546-m.jpg')"></div><div class="label">Na Mira</div></div>
    </div>

    <h2>FILMES</h2>
    <div class="row">
        <div class="card" onclick="playMovie('Zero D.C.', '', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/ZCLQVbmK/58d9aa9a-f9f9-44c4-bb0a-1623477faf39-m.jpg')"></div><div class="label">Zero D.C.</div></div>
        <div class="card" onclick="playMovie('Vingadora', '', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/1fKdJmSm/63bd29b4-91e3-4bc4-86b3-92c5f4a4846f-m.jpg')"></div><div class="label">Vingadora</div></div>
        <div class="card" onclick="playMovie('Exorcismo', '', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/xcPZtfQV/c78d8546-4f6d-4d6c-9daf-ceced978cb69-m.jpg')"></div><div class="label">Exorcismo</div></div>
        <div class="card" onclick="playMovie('Spider-Man', '', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/3kJcqsrF/DP-4690515-TC-1400x2100-DP-4690517-Spiderman-Far-From-Home-2019-ITUNES-2000x3000-BR-thumbnail-xlarge.jpg')"></div><div class="label">Spider-Man</div></div>
        <div class="card" onclick="playMovie('Demolidor', '', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/hf0YpDnd/images-1-15.jpg')"></div><div class="label">Demolidor</div></div>
        <div class="card" onclick="playMovie('Velozes', '', '')"><div class="poster" style="background-image:url('https://i.postimg.cc/dhtxfbQr/ca4b4076643dd71432ece4c1c63d8432.jpg')"></div><div class="label">Velozes</div></div>
    </div>

    <h2>SÉRIES E CANAIS</h2>
    <div class="row">
        <div class="card"><div class="poster" style="background:#444;"></div><div class="label">Séries</div></div>
        <div class="card" onclick="openModal('modalCanais')"><div class="poster" style="background:#E50914; display:flex; justify-content:center; align-items:center;">TV</div><div class="label">Canais ao Vivo</div></div>
    </div>

    <!-- MODAIS E SCRIPT -->
    <div id="modalAnuncio" class="overlay" style="display:flex;"><div class="box"><button onclick="closeModal('modalAnuncio')" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#fff; font-size:20px;">X</button><h3>Sem anúncios?</h3><button class="btn-main" onclick="startPay('Remover Ads', 'R$ 2,99')">Assinar R$ 2,99</button></div></div>
    <div id="modalCanais" class="overlay"><div class="box"><button onclick="closeModal('modalCanais')" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#fff; font-size:20px;">X</button><h3>TV Premium</h3><button class="btn-main" onclick="startPay('Canais TV', 'R$ 4,99')">Liberar R$ 4,99</button></div></div>
    
    <div id="modalPlayer" class="overlay">
        <div class="box" style="max-width:600px;">
            <button onclick="closeModal('modalPlayer')" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#fff; font-size:20px;">X</button>
            <h3 id="mTitle">Filme</h3>
            <div id="mContent" style="margin:15px 0; height:250px; background:#000;"></div>
            <button class="btn-main btn-assistir" id="btnAssistir" onclick="assistirFilme()">▶ Assistir ao Filme</button>
        </div>
    </div>

    <div id="modalPix" class="overlay"><div class="box"><h3 id="pixMsg">Pagamento</h3><input type="text" value="dfe7ba22-2505-4f4f-a1f9-aec0e440da13" id="cp" readonly style="width:100%; padding:10px; margin:10px 0;"><button class="btn-main" onclick="alert('Copiado!')">Copiar Pix</button><button onclick="closeModal('modalPix')" style="background:none; border:none; color:#666; margin-top:10px;">Voltar</button></div></div>

    <script>
        let linkAtual = "";
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function playMovie(t, id, link) {
            document.getElementById('mTitle').innerText = t;
            linkAtual = link;
            document.getElementById('mContent').innerHTML = id ? `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>` : "Trailer indisponível.";
            openModal('modalPlayer');
        }

        function assistirFilme() { linkAtual ? window.open(linkAtual, '_blank') : alert("Link do filme em breve!"); }
        
        function startPay(servico, preco) {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
            document.getElementById('pixMsg').innerText = servico + " - " + preco;
            openModal('modalPix');
        }
    </script>
</body>
</html>
