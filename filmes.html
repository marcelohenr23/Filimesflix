<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        header { display: flex; align-items: center; padding: 20px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #E50914; margin-right: 15px; }
        h1 { color: #E50914; font-size: 1.5rem; }
        
        /* Catálogo */
        .catalogo { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 200px; margin-bottom: 20px; }
        .item { min-width: 110px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .filme { width: 110px; height: 160px; background-color: #333; border-radius: 4px; background-size: cover; background-position: center; }
        .titulo-filme { margin-top: 8px; font-size: 0.75rem; text-align: center; color: #ccc; width: 100px; }

        /* Modais */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; justify-content:center; align-items:center; background:rgba(0,0,0,0.95); }
        .box { background:#111; padding:30px; border-radius:15px; width:90%; max-width:350px; text-align:center; border:1px solid #333; position:relative; }
        .btn-acao { display:block; width: 100%; padding: 15px; background: #E50914; color: #fff; text-align: center; font-weight: bold; border-radius: 4px; border:none; cursor:pointer; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="alert('Menu')">☰</div>
        <h1>Filmesflix</h1>
    </header>
    
    <h2>Lançamentos</h2>
    <div class="catalogo">
        <div class="item" onclick="abrirDetalhes('Rosário', 'el_c_8bkgRo')"><div class="filme" style="background-image: url('https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg');"></div><div class="titulo-filme">Rosário</div></div>
        <div class="item" onclick="abrirDetalhes('O Corvo', '')"><div class="filme" style="background-image: url('https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg');"></div><div class="titulo-filme">O Corvo</div></div>
    </div>

    <h2>FILMES</h2>
    <div class="catalogo">
        <div class="item" onclick="abrirDetalhes('Zero D.C.', '')"><div class="filme" style="background-image: url('https://i.postimg.cc/ZCLQVbmK/58d9aa9a-f9f9-44c4-bb0a-1623477faf39-m.jpg');"></div><div class="titulo-filme">Zero D.C.</div></div>
        <div class="item" onclick="abrirDetalhes('Vingadora', '')"><div class="filme" style="background-image: url('https://i.postimg.cc/1fKdJmSm/63bd29b4-91e3-4bc4-86b3-92c5f4a4846f-m.jpg');"></div><div class="titulo-filme">Vingadora</div></div>
    </div>

    <h2>SÉRIES</h2>
    <div class="catalogo"><div class="item"><div class="filme" style="background-color:#444;"></div><div class="titulo-filme">Série Exemplo</div></div></div>

    <h2>Canais ao vivo (Premium)</h2>
    <div class="catalogo">
        <div class="item" onclick="abrirModal('modalCanais')"><div class="filme" style="background-color: #E50914; display:flex; justify-content:center; align-items:center;">TV</div><div class="titulo-filme">Liberar Canais</div></div>
    </div>

    <!-- 1. Modal Anúncio (Remover Anúncios) -->
    <div id="modalAnuncio" class="modal" style="display:flex;">
        <div class="box">
            <button onclick="fechar('modalAnuncio')" style="position:absolute; top:10px; right:15px; background:none; border:none; color:#fff; font-size:1.5rem;">&times;</button>
            <div style="font-size:3rem; margin-bottom:20px;">🚫</div>
            <h2>Remover Anúncios</h2>
            <p style="margin:15px 0; color:#aaa;">Assine para uma experiência sem interrupções.</p>
            <button class="btn-acao" onclick="irParaPix('Remover Anúncios', 'R$ 2,99')">Assinar por R$ 2,99</button>
        </div>
    </div>

    <!-- 2. Modal Canais (Liberar TV) -->
    <div id="modalCanais" class="modal">
        <div class="box">
            <button onclick="fechar('modalCanais')" style="position:absolute; top:10px; right:15px; background:none; border:none; color:#fff; font-size:1.5rem;">&times;</button>
            <div style="font-size:3rem; margin-bottom:20px;">📺</div>
            <h2>TV Premium</h2>
            <p style="margin:15px 0; color:#aaa;">Libere todos os canais ao vivo agora.</p>
            <button class="btn-acao" onclick="irParaPix('TV Premium', 'R$ 4,99')">Liberar por R$ 4,99</button>
        </div>
    </div>

    <!-- 3. Modal Pagamento Pix (Único para ambos) -->
    <div id="modalPix" class="modal">
        <div class="box">
            <h2 id="pixTitulo">Pagamento</h2>
            <p id="pixPreco" style="margin:15px 0; color:#E50914; font-weight:bold;"></p>
            <input type="text" value="dfe7ba22-2505-4f4f-a1f9-aec0e440da13" id="chavePix" readonly style="width:100%; padding:10px; background:#222; border:1px solid #444; color:#fff; text-align:center;">
            <button class="btn-acao" style="margin-top:10px; background:#28a745;" onclick="alert('Copiado!')">Copiar Chave Pix</button>
            <button onclick="fechar('modalPix')" style="background:none; border:none; color:#666; margin-top:15px;">Voltar</button>
        </div>
    </div>

    <script>
        function abrirModal(id) { document.getElementById(id).style.display = "flex"; }
        function fechar(id) { document.getElementById(id).style.display = "none"; }
        
        function irParaPix(servico, preco) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('pixTitulo').innerText = servico;
            document.getElementById('pixPreco').innerText = preco;
            abrirModal('modalPix');
        }

        function abrirDetalhes(t, v) { /* Lógica de trailer aqui */ alert("Abrindo: " + t); }
    </script>
</body>
</html>
