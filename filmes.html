<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        header { display: flex; align-items: center; padding: 20px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #E50914; margin-right: 15px; }
        h1 { color: #E50914; font-size: 1.5rem; }
        
        #menuLateral { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.3s; padding-top: 60px; }
        #menuLateral a { padding: 15px 25px; text-decoration: none; font-size: 1.2rem; color: #fff; display: block; }
        #menuLateral .fechar-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; cursor: pointer; }

        h2 { font-size: 1.2rem; margin: 20px 0 10px 15px; color: #fff; }
        .catalogo { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 200px; }
        .item { min-width: 110px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .filme { width: 110px; height: 160px; background-color: #333; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        .titulo-filme { margin-top: 8px; font-size: 0.75rem; text-align: center; color: #ccc; width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #modalDetalhes { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; overflow-y:auto; }
        .capa-destaque { width: 100%; height: 300px; background-size: cover; background-position: center; }
        .info-filme { padding: 20px; }
        .btn-acao { display:block; width: 100%; padding: 15px; background: #fff; color: #000; text-align: center; font-weight: bold; border-radius: 4px; margin-bottom: 10px; text-decoration: none; }
    </style>
</head>
<body>

    <div id="menuLateral">
        <span class="fechar-btn" onclick="fecharMenu()">&times;</span>
        <a href="#">Início</a>
        <a href="#">Filmes</a>
        <a href="#">Premium</a>
    </div>

    <header>
        <div class="menu-icon" onclick="abrirMenu()">☰</div>
        <h1>Filmesflix</h1>
    </header>
    
    <h2>FILMES</h2>
    <div class="catalogo">
        <!-- Lista de todos os seus filmes -->
        <div class="item" onclick="abrirDetalhes('Rosário', 'https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg');"></div><div class="titulo-filme">Rosário</div></div>
        <div class="item" onclick="abrirDetalhes('O Corvo', 'https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg');"></div><div class="titulo-filme">O Corvo</div></div>
        <div class="item" onclick="abrirDetalhes('Na Mira do Atirador', 'https://i.postimg.cc/rK9HQVTk/27a21bc8-3960-4ad1-9b12-40dc6e001546-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/rK9HQVTk/27a21bc8-3960-4ad1-9b12-40dc6e001546-m.jpg');"></div><div class="titulo-filme">Na Mira</div></div>
        <div class="item" onclick="abrirDetalhes('Alerta Apocalipse', 'https://i.postimg.cc/D8cNBvhw/566b4cd6-2e64-4e3c-8984-261a6d7bb559-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/D8cNBvhw/566b4cd6-2e64-4e3c-8984-261a6d7bb559-m.jpg');"></div><div class="titulo-filme">Alerta Apoc.</div></div>
        <div class="item" onclick="abrirDetalhes('Zero D.C.', 'https://i.postimg.cc/ZCLQVbmK/58d9aa9a-f9f9-44c4-bb0a-1623477faf39-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/ZCLQVbmK/58d9aa9a-f9f9-44c4-bb0a-1623477faf39-m.jpg');"></div><div class="titulo-filme">Zero D.C.</div></div>
        <div class="item" onclick="abrirDetalhes('Vingadora', 'https://i.postimg.cc/1fKdJmSm/63bd29b4-91e3-4bc4-86b3-92c5f4a4846f-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/1fKdJmSm/63bd29b4-91e3-4bc4-86b3-92c5f4a4846f-m.jpg');"></div><div class="titulo-filme">Vingadora</div></div>
        <div class="item" onclick="abrirDetalhes('O Exorcismo', 'https://i.postimg.cc/xcPZtfQV/c78d8546-4f6d-4d6c-9daf-ceced978cb69-m.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/xcPZtfQV/c78d8546-4f6d-4d6c-9daf-ceced978cb69-m.jpg');"></div><div class="titulo-filme">Exorcismo</div></div>
        <div class="item" onclick="abrirDetalhes('Homem Aranha', 'https://i.postimg.cc/3kJcqsrF/DP-4690515-TC-1400x2100-DP-4690517-Spiderman-Far-From-Home-2019-ITUNES-2000x3000-BR-thumbnail-xlarge.jpg')"><div class="filme" style="background-image: url('https://i.postimg.cc/3kJcqsrF/DP-4690515-TC-1400x2100-DP-4690517-Spiderman-Far-From-Home-2019-ITUNES-2000x3000-BR-thumbnail-xlarge.jpg');"></div><div class="titulo-filme">Spider-Man</div></div>
    </div>

    <h2>Canais ao vivo (Premium)</h2>
    <div class="catalogo">
        <div class="item" onclick="mostrarBloqueio()"><div class="filme" style="background-color: #E50914; display:flex; justify-content:center; align-items:center;">TV</div><div class="titulo-filme">Canal Premium</div></div>
    </div>

    <!-- Tela de Detalhes -->
    <div id="modalDetalhes">
        <div id="capaFilme" class="capa-destaque"></div>
        <div class="info-filme">
            <h2 id="tituloFilme" style="font-size: 2rem; margin-bottom: 20px;">Filme</h2>
            <a href="#" class="btn-acao">▶ Assistir Agora</a>
            <button onclick="fecharDetalhes()" style="padding:15px; width:100%; background:#333; color:#fff; border:none; border-radius:4px;">Voltar</button>
        </div>
    </div>

    <!-- Modal Premium -->
    <div id="modalPremium" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:4000; justify-content:center; align-items:center; text-align:center;">
        <div style="background:#181818; padding:30px; border-radius:10px; border: 2px solid #E50914; width: 85%;">
            <h2 style="color:#E50914;">Acesso Premium</h2>
            <p style="margin: 20px 0;">Assine por apenas R$ 4,99</p>
            <div id="areaBotaoPix"><button onclick="exibirChavePix()" style="padding:15px; width:100%; background:#E50914; border:none; color:#fff; font-weight:bold; border-radius:4px; cursor:pointer;">Pagar com Pix</button></div>
            <div id="areaChavePix" style="display:none; margin-top:20px;">
                <input type="text" value="dfe7ba22-2505-4f4f-a1f9-aec0e440da13" id="chavePix" style="display:none;">
                <button onclick="copiarPix()" style="padding:12px; width:100%; background:#28a745; border:none; color:#fff; font-weight:bold; border-radius:4px; cursor:pointer;">Copiar Chave Pix</button>
            </div>
            <button onclick="fecharModal()" style="margin-top:15px; padding:10px; background:#444; color:#fff; border:none; width:100%;">Fechar</button>
        </div>
    </div>

    <script>
        function abrirMenu() { document.getElementById("menuLateral").style.width = "250px"; }
        function fecharMenu() { document.getElementById("menuLateral").style.width = "0"; }
        function abrirDetalhes(t, i) { document.getElementById('tituloFilme').innerText = t; document.getElementById('capaFilme').style.backgroundImage = 'url('+i+')'; document.getElementById('modalDetalhes').style.display = 'block'; }
        function fecharDetalhes() { document.getElementById('modalDetalhes').style.display = 'none'; }
        function mostrarBloqueio() { document.getElementById('modalPremium').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalPremium').style.display = 'none'; }
        function exibirChavePix() { document.getElementById('areaBotaoPix').style.display = 'none'; document.getElementById('areaChavePix').style.display = 'block'; }
        function copiarPix() { var c = document.getElementById("chavePix"); navigator.clipboard.writeText(c.value).then(() => { alert("Chave copiada!"); }); }
    </script>
</body>
</html>
