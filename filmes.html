<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        
        /* Cabeçalho */
        header { display: flex; align-items: center; padding: 20px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #E50914; margin-right: 15px; }
        h1 { color: #E50914; font-size: 1.5rem; }
        
        /* Menu Lateral Estiloso */
        #menuLateral {
            height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0;
            background-color: #111; overflow-x: hidden; transition: 0.3s; padding-top: 60px;
        }
        #menuLateral a { padding: 15px 25px; text-decoration: none; font-size: 1.2rem; color: #fff; display: block; transition: 0.3s; }
        #menuLateral a:hover { background-color: #E50914; }
        #menuLateral .fechar-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; cursor: pointer; }

        h2 { font-size: 1.2rem; margin: 20px 0 10px 15px; color: #fff; }
        .catalogo { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 200px; }
        .item { min-width: 110px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .filme { width: 110px; height: 160px; background-color: #333; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        .titulo-filme { margin-top: 8px; font-size: 0.75rem; text-align: center; color: #ccc; width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-sair { margin: 40px auto; display: block; padding: 10px 30px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Menu Lateral -->
    <div id="menuLateral">
        <span class="fechar-btn" onclick="fecharMenu()">&times;</span>
        <a href="#">Início</a>
        <a href="#">Minha Lista</a>
        <a href="#">Filmes</a>
        <a href="#">Séries</a>
        <a href="#">Configurações</a>
    </div>

    <header>
        <div class="menu-icon" onclick="abrirMenu()">☰</div>
        <h1>Filmesflix</h1>
    </header>
    
    <!-- (Catálogo mantido igual) -->
    <h2>Filme recente</h2>
    <div class="catalogo">
        <div class="item"><div class="filme" style="background-image: url('https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg');"></div><div class="titulo-filme">Rosário</div></div>
        <div class="item"><div class="filme" style="background-image: url('https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg');"></div><div class="titulo-filme">O Corvo</div></div>
    </div>

    <h2>FILMES</h2>
    <div class="catalogo">
        <div class="item"><div class="filme" style="background-image: url('https://i.postimg.cc/ZCLQVbmK/58d9aa9a-f9f9-44c4-bb0a-1623477faf39-m.jpg');"></div><div class="titulo-filme">Zero D.C.</div></div>
        <div class="item"><div class="filme" style="background-image: url('https://i.postimg.cc/1fKdJmSm/63bd29b4-91e3-4bc4-86b3-92c5f4a4846f-m.jpg');"></div><div class="titulo-filme">Vingadora</div></div>
    </div>

    <h2>Canais ao vivo (Premium)</h2>
    <div class="catalogo">
        <div class="item" onclick="mostrarBloqueio()">
            <div class="filme" style="background-color: #E50914; display:flex; justify-content:center; align-items:center;">TV</div>
            <div class="titulo-filme">Canal Premium</div>
        </div>
    </div>

    <!-- Modal Premium -->
    <div id="modalPremium" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; text-align:center;">
        <div style="background:#181818; padding:30px; border-radius:10px; border: 2px solid #E50914; width: 85%; max-width: 320px;">
            <h2 style="color:#E50914; margin-bottom:15px;">Acesso Premium</h2>
            <p>Tenha acesso a todos os canais ao vivo!</p>
            <p style="font-size:1.3rem; font-weight:bold; margin:20px 0;">Assine por apenas R$ 4,99</p>
            
            <div id="areaBotaoPix">
                <button onclick="exibirChavePix()" style="padding:15px; width:100%; background:#E50914; border:none; color:#fff; font-weight:bold; border-radius:4px; cursor:pointer;">Pagar com Pix</button>
            </div>

            <div id="areaChavePix" style="display:none; margin-top:20px; background:#000; padding:15px; border-radius:8px;">
                <p style="font-size: 0.9rem; color: #fff; margin-bottom: 10px;">Clique para copiar a chave Pix:</p>
                <input type="text" value="dfe7ba22-2505-4f4f-a1f9-aec0e440da13" id="chavePix" style="display:none;">
                <button onclick="copiarPix()" style="padding:12px; width:100%; background:#28a745; border:none; color:#fff; font-weight:bold; border-radius:4px; cursor:pointer;">Copiar Chave Pix</button>
            </div>
            
            <button onclick="fecharModal()" style="margin-top:20px; padding:10px; background:#444; border:none; color:#fff; border-radius:4px; cursor:pointer; width: 100%;">Fechar</button>
        </div>
    </div>

    <script>
        // Funções do Menu
        function abrirMenu() { document.getElementById("menuLateral").style.width = "250px"; }
        function fecharMenu() { document.getElementById("menuLateral").style.width = "0"; }
        
        // Funções existentes
        function sair() { localStorage.removeItem('usuarioLogado'); window.location.href = 'index.html'; }
        function mostrarBloqueio() { document.getElementById('modalPremium').style.display = 'flex'; document.getElementById('areaBotaoPix').style.display = 'block'; document.getElementById('areaChavePix').style.display = 'none'; }
        function exibirChavePix() { document.getElementById('areaBotaoPix').style.display = 'none'; document.getElementById('areaChavePix').style.display = 'block'; }
        function fecharModal() { document.getElementById('modalPremium').style.display = 'none'; }
        function copiarPix() { var copyText = document.getElementById("chavePix"); navigator.clipboard.writeText(copyText.value).then(() => { alert("Chave Pix copiada!"); }); }
    </script>
</body>
</html>
