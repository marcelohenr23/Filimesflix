<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        
        header { display: flex; align-items: center; padding: 20px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: #fff; margin-right: 15px; }
        h1 { color: #E50914; font-size: 1.5rem; }
        h2 { font-size: 1.2rem; margin: 20px 0 10px 15px; color: #fff; }
        
        .catalogo { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 200px; }
        .item { min-width: 110px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        .filme { width: 110px; height: 160px; background-color: #333; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        .titulo-filme { margin-top: 8px; font-size: 0.75rem; text-align: center; color: #ccc; width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-sair { margin: 40px auto; display: block; padding: 10px 30px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="alert('Menu em desenvolvimento!')">☰</div>
        <h1>Filmesflix</h1>
    </header>
    
    <!-- (Mantive seu catálogo aqui - omisso para economizar espaço) -->

    <h2>Canais ao vivo (Premium)</h2>
    <div class="catalogo">
        <div class="item" onclick="mostrarBloqueio()">
            <div class="filme" style="background-color: #E50914; display:flex; justify-content:center; align-items:center;">TV</div>
            <div class="titulo-filme">Canal Premium</div>
        </div>
    </div>

    <!-- Modal Premium -->
    <div id="modalPremium" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; text-align:center;">
        <div style="background:#181818; padding:30px; border-radius:10px; border: 2px solid #E50914; width: 85%; max-width: 320px;">
            <h2 style="color:#E50914; margin-bottom:15px;">Acesso Premium</h2>
            <p>Assine por apenas <strong>R$ 4,99</strong></p>
            
            <!-- Botão que gera o PIX -->
            <div id="areaBotaoPix">
                <button onclick="exibirChavePix()" style="margin-top:20px; padding:15px; width:100%; background:#E50914; border:none; color:#fff; font-weight:bold; border-radius:4px; cursor:pointer;">Pagar com Pix</button>
            </div>

            <!-- Área oculta que só aparece depois do clique -->
            <div id="areaChavePix" style="display:none; margin-top:20px; background:#000; padding:15px; border-radius:8px;">
                <p style="font-size: 0.8rem; color: #ccc; margin-bottom: 5px;">Copie a chave abaixo:</p>
                <input type="text" value="dfe7ba22-2505-4f4f-a1f9-aec0e440da13" id="chavePix" readonly style="width:100%; text-align:center; background:transparent; color:#0f0; border:1px solid #444; padding:5px; margin-bottom:10px;">
                <button onclick="copiarPix()" style="padding:8px; width:100%; background:#28a745; border:none; color:#fff; border-radius:4px; cursor:pointer;">Copiar Chave</button>
            </div>
            
            <button onclick="fecharModal()" style="margin-top:20px; padding:10px; background:#444; border:none; color:#fff; border-radius:4px; cursor:pointer; width: 100%;">Fechar</button>
        </div>
    </div>

    <script>
        function mostrarBloqueio() { 
            document.getElementById('modalPremium').style.display = 'flex'; 
            document.getElementById('areaBotaoPix').style.display = 'block';
            document.getElementById('areaChavePix').style.display = 'none';
        }
        function exibirChavePix() {
            document.getElementById('areaBotaoPix').style.display = 'none';
            document.getElementById('areaChavePix').style.display = 'block';
        }
        function fecharModal() { document.getElementById('modalPremium').style.display = 'none'; }
        function copiarPix() {
            var copyText = document.getElementById("chavePix");
            copyText.select();
            document.execCommand("copy");
            alert("Chave copiada! Faça o Pix no seu banco.");
        }
    </script>
</body>
</html>
