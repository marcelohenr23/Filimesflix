<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlix Premium</title>
    <style>
        /* Estilo Dark Mode Profissional */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f13; color: #fff; padding-bottom: 100px; }
        
        /* Menu Superior */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #000; sticky: top; }
        .logo { color: #e50914; font-weight: bold; font-size: 1.5rem; }
        nav button { background: #222; color: #fff; border: none; padding: 8px 16px; margin-left: 5px; border-radius: 20px; font-weight: 600; cursor: pointer; }
        nav button.active { background: #e50914; }

        /* Seções do Catálogo */
        section { padding: 20px; }
        h2 { font-size: 1.3rem; margin-bottom: 15px; color: #fff; border-left: 4px solid #e50914; padding-left: 8px; }
        
        /* Grid de Filmes Adaptável para Celular */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .card { background: #1c1c24; border-radius: 8px; overflow: hidden; position: relative; aspect-ratio: 2/3; display: flex; align-items: flex-end; padding: 10px; background-size: cover; background-position: center; }
        .card span { font-size: 0.8rem; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        /* Badges de Lançamento */
        .badge { position: absolute; top: 5px; left: 5px; background: #e50914; font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; font-weight: bold; }

        /* Overlay do Anúncio Premium Estiloso */
        .overlay-premium { position: fixed; bottom: 20px; left: 5%; right: 5%; background: linear-gradient(135deg, #1e1e2f 0%, #0f0f19 100%); border: 2px solid #8a2be2; border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0px 0px 20px rgba(138, 43, 226, 0.5); z-index: 1000; animation: pulse 2s infinite; }
        .overlay-text h3 { font-size: 1rem; color: #fff; margin-bottom: 2px; }
        .overlay-text p { font-size: 0.75rem; color: #b3b3b3; }
        .overlay-text span { color: #00ffcc; font-weight: bold; }
        .btn-premium { background: linear-gradient(90deg, #8a2be2, #4a00e0); color: #fff; border: none; padding: 10px 16px; border-radius: 25px; font-weight: bold; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); }
            50% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.7); }
            100% { box-shadow: 0 0 10px rgba(138, 43, 226, 0.4); }
        }
    </style>
</head>
<body>

    <!-- Menu -->
    <header>
        <div class="logo">CINEFLIX</div>
        <nav>
            <button class="active">Filmes</button>
            <button>Séries</button>
        </nav>
    </header>

    <!-- Lançamentos -->
    <section>
        <h2>🔥 Filmes Lançamento</h2>
        <div class="grid">
            <!-- Nota: Substitua o background-image pelos links das suas capas se quiser -->
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=1');">
                <div class="badge">NOVO</div>
                <span>Avatar 3</span>
            </div>
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=2');">
                <div class="badge">NOVO</div>
                <span>Miranha 4</span>
            </div>
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=3');">
                <div class="badge">NOVO</div>
                <span>Batman 2</span>
            </div>
        </div>
    </section>

    <!-- Filmes Populares -->
    <section>
        <h2>🎬 Filmes Recomendados</h2>
        <div class="grid">
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=4');"><span>Interestelar</span></div>
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=5');"><span>Gladiador</span></div>
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=6');"><span>Matrix</span></div>
        </div>
    </section>

    <!-- Séries -->
    <section>
        <h2>📺 Séries em Alta</h2>
        <div class="grid">
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=7');"><span>Stranger Things</span></div>
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=8');"><span>The Last of Us</span></div>
            <div class="card" style="background-image: linear-gradient(transparent, #000), url('https://picsum.photos/200/300?random=9');"><span>Breaking Bad</span></div>
        </div>
    </section>

    <!-- Overlay de Anúncio Premium Fixo no Rodapé -->
    <div class="overlay-premium">
        <div class="overlay-text">
            <h3>Navegue Sem Anúncios 🍿</h3>
            <p>Assista em 4K por apenas <span>R$ 3,99/mês</span></p>
        </div>
        <button class="btn-premium">Usar sem Anúncios</button>
    </div>

</body>
</html>
