<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmesflix - Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; padding-bottom: 50px; }
        header { display: flex; align-items: center; padding: 20px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #E50914; margin-right: 15px; }
        h1 { color: #E50914; font-size: 1.5rem; }
        
        /* Estilos do Catálogo */
        .catalogo { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; min-height: 200px; }
        .item { min-width: 110px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .filme { width: 110px; height: 160px; background-color: #333; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        .titulo-filme { margin-top: 8px; font-size: 0.75rem; text-align: center; color: #ccc; width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modal de Detalhes */
        #modalDetalhes { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; overflow-y:auto; }
        .capa-destaque { width: 100%; height: 300px; background-size: cover; background-position: center; }
        .info-filme { padding: 20px; }
        .btn-assistir { display:block; width: 100%; padding: 15px; background: #fff; color: #000; text-align: center; font-weight: bold; border-radius: 4px; margin-bottom: 10px; text-decoration: none; }
        .btn-trailer { display:block; width: 100%; padding: 15px; background: #333; color: #fff; text-align: center; border-radius: 4px; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="alert('Menu lateral em breve!')">☰</div>
        <h1>Filmesflix</h1>
    </header>
    
    <h2>FILMES</h2>
    <div class="catalogo">
        <!-- Exemplo de como chamar o filme -->
        <div class="item" onclick="abrirDetalhes('Rosário', 'https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg')">
            <div class="filme" style="background-image: url('https://i.postimg.cc/SJGPDS4q/18335a8f-c7e0-4a49-8c7d-3a93fecf32d8-m.jpg');"></div>
            <div class="titulo-filme">Rosário</div>
        </div>
        <div class="item" onclick="abrirDetalhes('O Corvo', 'https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg')">
            <div class="filme" style="background-image: url('https://i.postimg.cc/RNTYXSmz/266cbaf8-15c3-4a47-b81e-7776ae702ef8-m.jpg');"></div>
            <div class="titulo-filme">O Corvo</div>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div id="modalDetalhes">
        <div id="capaFilme" class="capa-destaque"></div>
        <div class="info-filme">
            <h2 id="tituloFilme" style="font-size: 2rem; margin-bottom: 20px;">Nome do Filme</h2>
            <a href="#" class="btn-assistir">▶ Assistir Agora</a>
            <a href="#" class="btn-trailer">Ver Trailer</a>
            <button onclick="fecharDetalhes()" style="margin-top:20px; background:transparent; border:none; color:#888; width:100%;">Voltar</button>
        </div>
    </div>

    <script>
        function abrirDetalhes(titulo, imagem) {
            document.getElementById('tituloFilme').innerText = titulo;
            document.getElementById('capaFilme').style.backgroundImage = 'url('+imagem+')';
            document.getElementById('modalDetalhes').style.display = 'block';
        }
        function fecharDetalhes() {
            document.getElementById('modalDetalhes').style.display = 'none';
        }
    </script>
</body>
</html>
